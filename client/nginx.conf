server {
    listen 80;
    server_name localhost;

    # مسار ملفات الواجهة المبنية
    root /usr/share/nginx/html;
    index index.html;

    # توجيه طلبات الصفحات مباشرة إلى index.html لدعم React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # توجيه طلبات الواجهة البرمجية (API) إلى سيرفر الباك إند
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # توجيه طلبات المرفقات والصور إلى سيرفر الباك إند
    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # توجيه طلبات Socket.io إن وجدت
    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
