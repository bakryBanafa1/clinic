version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - clinic_data:/data
      - clinic_uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=5000

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  clinic_data:
  clinic_uploads:
