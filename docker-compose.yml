version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: clinic-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - clinic_data:/data
      - clinic_uploads:/app/uploads
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: clinic-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  clinic_data:
    name: clinic_data_vol
  clinic_uploads:
    name: clinic_uploads_vol
